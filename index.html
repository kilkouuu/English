<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy English</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 16px; background: #f0f2f5; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        nav button { cursor: pointer; padding: 12px; border: none; border-radius: 8px; flex: 1; font-weight: bold; font-size: 15px; background: #eee; color: #333; }
        nav button.active { background: #007bff; color: white; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid #ddd; width: 100%; margin-bottom: 10px; border-radius: 6px; font-size: 16px; }
        .word-item { background: white; padding: 10px 14px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid #007bff; align-items: center; }
        .stats { font-size: 12px; color: gray; margin: 8px 0; }
        #quiz-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        #quiz-tabs button { cursor: pointer; font-size: 12px; padding: 9px 6px; background: #eee; color: #333; border: none; border-radius: 8px; font-weight: bold; line-height: 1.3; }
        #quiz-tabs button.active { background: #007bff; color: white; }
        #score-bar { height: 6px; background: #eee; border-radius: 3px; margin: 8px 0 14px; overflow: hidden; }
        #score-fill { height: 100%; background: #28a745; width: 0%; transition: width 0.4s; border-radius: 3px; }
        .q-btn { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; padding: 12px; width: 100%; margin-top: 8px; }
        .res-btn { cursor: pointer; width: 100%; padding: 14px; font-size: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; }
        .level-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        textarea.export-area { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: monospace; resize: none; background: white; }
        .question-label { font-size: 12px; color: #aaa; margin: 0 0 6px; }
        .question-word { font-size: 30px; font-weight: bold; margin: 6px 0 14px; }
        .answer-word { color: #28a745; font-size: 22px; font-weight: bold; margin: 0 0 14px; }
    </style>
</head>
<body>

<nav>
    <button id="b1" class="active" onclick="tab('add')">📖 Словарь</button>
    <button id="b2" onclick="tab('quiz')">🎯 Тренировка</button>
</nav>

<!-- СЛОВАРЬ -->
<div id="add">
    <div class="card">
        <input type="text" id="e" placeholder="English...">
        <input type="text" id="r" placeholder="Перевод...">
        <button onclick="addWord()" style="background:#28a745;color:white;width:100%;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:bold;cursor:pointer;">Сохранить</button>
    </div>

    <div class="card" style="margin-top:14px;">
        <p style="font-size:13px;font-weight:bold;margin:0 0 10px;color:#555;">📤 Перенос слов между браузерами</p>
        <button onclick="exportWords()" style="background:#17a2b8;color:white;width:100%;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:bold;cursor:pointer;">📋 Скопировать мои слова</button>
        <div id="export-area-wrap" class="hidden" style="margin-top:10px;">
            <textarea id="export-area" class="export-area" readonly></textarea>
            <p style="font-size:12px;color:gray;margin:6px 0 0;">Выдели всё → скопируй → вставь в другом браузере</p>
        </div>
        <div style="border-top:1px solid #eee;margin:14px 0;"></div>
        <p style="font-size:13px;color:#555;margin:0 0 8px;">Вставь скопированный код сюда:</p>
        <textarea id="import-area" class="export-area" placeholder="Вставь сюда..." style="height:80px;"></textarea>
        <button onclick="importWords()" style="background:#6f42c1;color:white;width:100%;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:6px;">📥 Загрузить слова</button>
        <div id="import-status" style="font-size:13px;text-align:center;margin-top:8px;min-height:18px;"></div>
    </div>

    <input type="text" id="search" placeholder="🔍 Поиск..." oninput="render()" style="margin-top:14px;">
    <div id="list"></div>
    <button onclick="clearAll()" style="margin-top:14px;background:none;color:gray;font-size:11px;border:1px solid #ccc;border-radius:6px;padding:8px;width:100%;cursor:pointer;">Очистить все слова</button>
</div>

<!-- ТРЕНИРОВКА -->
<div id="quiz" class="hidden">
    <!-- 4 вкладки 2x2 -->
    <div id="quiz-tabs">
        <button id="qt1" class="active"  onclick="setMode('flash-en')">👁 EN → RU<br><span style="font-weight:normal;font-size:11px;">знаю / не знаю</span></button>
        <button id="qt2"                 onclick="setMode('type-en')">✍️ EN → RU<br><span style="font-weight:normal;font-size:11px;">написать перевод</span></button>
        <button id="qt3"                 onclick="setMode('flash-ru')">👁 RU → EN<br><span style="font-weight:normal;font-size:11px;">знаю / не знаю</span></button>
        <button id="qt4"                 onclick="setMode('type-ru')">✍️ RU → EN<br><span style="font-weight:normal;font-size:11px;">написать по-английски</span></button>
    </div>

    <div id="quiz-card" class="card" style="text-align:center;">
        <div id="count" class="stats"></div>
        <div id="score-bar"><div id="score-fill"></div></div>
        <div id="word-level" style="font-size:12px;margin-bottom:4px;"></div>

        <!-- Общий вопрос -->
        <p id="q-label" class="question-label"></p>
        <div id="q-word" class="question-word"></div>

        <!-- Режим: знаю/не знаю -->
        <div id="mode-flash">
            <div id="a-word" class="answer-word hidden"></div>
            <button class="q-btn" onclick="showAns()" style="background:#eee;color:#333;">👁 Показать ответ</button>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="q-btn" onclick="markCard(false)" style="background:#f8d7da;color:#721c24;flex:1;">✗ Не знал</button>
                <button class="q-btn" onclick="markCard(true)"  style="background:#d4edda;color:#155724;flex:1;">✓ Знал</button>
            </div>
        </div>

        <!-- Режим: написать -->
        <div id="mode-type" class="hidden">
            <input type="text" id="type-input" placeholder="Введи ответ..." style="text-align:center;font-size:18px;">
            <button class="q-btn" onclick="checkType()" style="background:#007bff;color:white;">Проверить</button>
            <div id="type-result" style="font-size:15px;margin:10px 0;min-height:22px;"></div>
            <button id="next-type" class="q-btn hidden" onclick="next()" style="background:#555;color:white;">Дальше →</button>
        </div>
    </div>

    <div id="results-screen" class="hidden card" style="text-align:center;">
        <div id="results-body"></div>
    </div>
</div>

<script>
const LEVEL_LABELS = ['🔴 Новое','🟠 Сложное','🟡 Учу','🟢 Знаю','💙 Хорошо','⭐ Отлично'];
const LEVEL_COLORS = ['#dc3545','#fd7e14','#ffc107','#28a745','#007bff','#6f42c1'];
const COOLDOWN    = [0, 2, 5, 11, 24, 49];
const W           = [100, 40, 15, 5, 2, 1];

let myWords = JSON.parse(localStorage.getItem('myWords')) || [];
let quizMode = 'flash-en';  // flash-en | type-en | flash-ru | type-ru
let score = { correct: 0, total: 0 };
let answerShown = false;
let recentlyShown = [];
let current = null;

function ensureLevels() {
    myWords.forEach(w => { if (w.level === undefined) w.level = 0; });
}

// ====== АЛГОРИТМ ======
function pickNext() {
    ensureLevels();
    if (!myWords.length) return null;
    let available = myWords.filter(w => {
        let lastIdx = recentlyShown.lastIndexOf(w.en);
        if (lastIdx === -1) return true;
        return (recentlyShown.length - lastIdx) > COOLDOWN[Math.min(w.level, 5)];
    });
    if (!available.length) {
        available = [...myWords].sort((a,b) => recentlyShown.lastIndexOf(a.en) - recentlyShown.lastIndexOf(b.en));
        available = [available[0]];
    }
    let total = available.reduce((s,w) => s + W[Math.min(w.level,5)], 0);
    let rand = Math.random() * total;
    let chosen = available[0];
    for (let w of available) { rand -= W[Math.min(w.level,5)]; if (rand <= 0) { chosen = w; break; } }
    recentlyShown.push(chosen.en);
    if (recentlyShown.length > 60) recentlyShown.shift();
    return { en: chosen.en, ru: chosen.ru, level: chosen.level };
}

function updateLevel(en, knew) {
    let w = myWords.find(x => x.en === en);
    if (!w) return;
    w.level = knew ? Math.min((w.level||0)+1, 5) : Math.max((w.level||0)-1, 0);
    save();
}

// ====== ЭКСПОРТ / ИМПОРТ ======
function exportWords() {
    if (!myWords.length) { alert("Нет слов!"); return; }
    let code = btoa(unescape(encodeURIComponent(JSON.stringify(myWords))));
    let wrap = document.getElementById('export-area-wrap');
    let area = document.getElementById('export-area');
    wrap.classList.remove('hidden');
    area.value = code; area.select();
    try { document.execCommand('copy'); area.style.borderColor='#28a745'; setTimeout(()=>area.style.borderColor='#ddd',2000); } catch(e){}
}
function importWords() {
    let raw = document.getElementById('import-area').value.trim();
    let status = document.getElementById('import-status');
    if (!raw) { status.innerHTML='<span style="color:#dc3545">⚠️ Вставь код</span>'; return; }
    try {
        let imported = JSON.parse(decodeURIComponent(escape(atob(raw))));
        if (!Array.isArray(imported)) throw new Error();
        let added = 0;
        imported.forEach(w => {
            if (w.en && w.ru && !myWords.find(x => x.en.toLowerCase()===w.en.toLowerCase())) {
                myWords.push({ en:w.en, ru:w.ru, level:w.level||0 }); added++;
            }
        });
        save(); render();
        document.getElementById('import-area').value='';
        status.innerHTML=`<span style="color:#28a745">✓ Добавлено: ${added} слов</span>`;
    } catch(e) { status.innerHTML='<span style="color:#dc3545">⚠️ Неверный код.</span>'; }
}

// ====== СЛОВАРЬ ======
function addWord() {
    let en = document.getElementById('e').value.trim();
    let ru = document.getElementById('r').value.trim();
    if (!en || !ru) return;
    if (myWords.find(w => w.en.toLowerCase()===en.toLowerCase())) { alert("Уже есть!"); return; }
    myWords.push({ en, ru, level:0 });
    save(); render();
    document.getElementById('e').value='';
    document.getElementById('r').value='';
}
function save() { localStorage.setItem('myWords', JSON.stringify(myWords)); }
function render() {
    ensureLevels();
    let q = (document.getElementById('search').value||'').toLowerCase();
    let d = document.getElementById('list');
    let filtered = myWords.filter(w => !q || w.en.toLowerCase().includes(q) || w.ru.toLowerCase().includes(q));
    let counts = [0,0,0,0,0,0];
    myWords.forEach(w => counts[Math.min(w.level||0,5)]++);
    d.innerHTML = `<div class="stats">Слов: ${myWords.length} &nbsp;·&nbsp; 🔴${counts[0]} 🟠${counts[1]} 🟡${counts[2]} 🟢${counts[3]} 💙${counts[4]} ⭐${counts[5]}</div>`;
    filtered.forEach((w,i) => {
        let lvl = Math.min(w.level||0,5);
        d.innerHTML += `<div class="word-item">
            <span><span class="level-dot" style="background:${LEVEL_COLORS[lvl]};"></span><b>${w.en}</b> — ${w.ru}</span>
            <button onclick="delWord(${i})" style="color:red;background:none;border:none;font-size:18px;padding:4px 8px;cursor:pointer;">✕</button>
        </div>`;
    });
}
function delWord(i) { myWords.splice(i,1); save(); render(); }
function clearAll() { if(confirm("Удалить все?")) { myWords=[]; save(); render(); } }

// ====== ВКЛАДКИ ======
function tab(t) {
    document.getElementById('add').className  = t==='add'  ? '' : 'hidden';
    document.getElementById('quiz').className = t==='quiz' ? '' : 'hidden';
    document.getElementById('b1').className   = t==='add'  ? 'active' : '';
    document.getElementById('b2').className   = t==='quiz' ? 'active' : '';
    if (t==='quiz') startFresh();
}
function setMode(m) {
    quizMode = m;
    ['qt1','qt2','qt3','qt4'].forEach((id,i) => {
        document.getElementById(id).className = (['flash-en','type-en','flash-ru','type-ru'][i]===m) ? 'active' : '';
    });
    startFresh();
}

// ====== РАУНД ======
function startFresh() {
    score = { correct:0, total:0 };
    recentlyShown = [];
    document.getElementById('results-screen').classList.add('hidden');
    document.getElementById('quiz-card').classList.remove('hidden');
    next();
}

function next() {
    if (!myWords.length) { alert("Добавь слова!"); return; }
    if (score.total > 0 && score.total % 20 === 0) { showSummary(); return; }

    current = pickNext();
    if (!current) return;
    answerShown = false;

    // Уровень
    let lvl = Math.min(current.level||0, 5);
    document.getElementById('word-level').innerText = LEVEL_LABELS[lvl];
    document.getElementById('word-level').style.color = LEVEL_COLORS[lvl];

    // Определяем что показывать как вопрос и что как ответ
    let isRU = quizMode === 'flash-ru' || quizMode === 'type-ru';
    let qText = isRU ? current.ru : current.en;
    let qLabel = isRU ? '🇷🇺 Переведи на английский:' : '🇬🇧 Переведи на русский:';

    document.getElementById('q-label').innerText = qLabel;
    document.getElementById('q-word').innerText = qText;
    updateCount();

    let isFlash = quizMode === 'flash-en' || quizMode === 'flash-ru';
    let aText = isRU ? current.en : current.ru;

    if (isFlash) {
        document.getElementById('mode-flash').classList.remove('hidden');
        document.getElementById('mode-type').classList.add('hidden');
        document.getElementById('a-word').innerText = aText;
        document.getElementById('a-word').classList.add('hidden');
    } else {
        document.getElementById('mode-flash').classList.add('hidden');
        document.getElementById('mode-type').classList.remove('hidden');
        document.getElementById('type-input').value='';
        document.getElementById('type-result').innerText='';
        document.getElementById('next-type').classList.add('hidden');
        let placeholder = isRU ? 'Введи по-английски...' : 'Введи перевод...';
        document.getElementById('type-input').placeholder = placeholder;
        setTimeout(()=>document.getElementById('type-input').focus(),100);
    }
}

function updateCount() {
    let pct = score.total>0 ? Math.round(score.correct/score.total*100) : 0;
    document.getElementById('count').innerText = `📚 Ответов: ${score.total} · Верно: ${score.correct} (${pct}%)`;
    document.getElementById('score-fill').style.width = pct+'%';
}

// ====== КАРТОЧКИ: знаю/не знаю ======
function showAns() {
    document.getElementById('a-word').classList.remove('hidden');
    answerShown = true;
}
function markCard(knew) {
    if (!answerShown) { showAns(); return; }
    score.total++;
    if (knew) score.correct++;
    updateLevel(current.en, knew);
    let newLvl = Math.min(myWords.find(w=>w.en===current.en)?.level||0, 5);
    document.getElementById('word-level').innerText = LEVEL_LABELS[newLvl];
    document.getElementById('word-level').style.color = LEVEL_COLORS[newLvl];
    next();
}

// ====== ПИСЬМО ======
function checkType() {
    let inp = document.getElementById('type-input').value.trim().toLowerCase();
    if (!inp) return;
    let isRU = quizMode === 'type-ru';
    // Правильный ответ зависит от направления
    let correct = isRU ? current.en.toLowerCase() : current.ru.toLowerCase();
    let variants = correct.split('/').map(v=>v.trim());
    let ok = variants.some(v=>v===inp);
    score.total++;
    if (ok) {
        score.correct++;
        document.getElementById('type-result').innerHTML=`<span style="color:#28a745">✓ Верно!</span>`;
    } else {
        let show = isRU ? current.en : current.ru;
        document.getElementById('type-result').innerHTML=`<span style="color:#dc3545">✗ Правильно: <b>${show}</b></span>`;
    }
    updateLevel(current.en, ok);
    updateCount();
    document.getElementById('next-type').classList.remove('hidden');
}
document.getElementById('type-input').addEventListener('keydown', e=>{
    if (e.key==='Enter') {
        if (!document.getElementById('next-type').classList.contains('hidden')) next();
        else checkType();
    }
});

// ====== ИТОГ ======
function showSummary() {
    document.getElementById('quiz-card').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');
    ensureLevels();
    let pct = Math.round(score.correct/score.total*100);
    let emoji = pct>=80?'🎉':pct>=50?'💪':'😅';
    let counts = [0,0,0,0,0,0];
    myWords.forEach(w=>counts[Math.min(w.level||0,5)]++);
    document.getElementById('results-body').innerHTML = `
        <div style="font-size:48px;margin:8px 0;">${emoji}</div>
        <h2 style="margin:6px 0;">${score.correct} / ${score.total} верно · ${pct}%</h2>
        <div style="background:#f8f9fa;border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:14px;line-height:2;">
            🔴🟠 Слабые: <b>${counts[0]+counts[1]}</b> — попадаются часто<br>
            🟡 В процессе: <b>${counts[2]}</b><br>
            🟢💙⭐ Сильные: <b>${counts[3]+counts[4]+counts[5]}</b> — попадаются редко
        </div>
        <button class="res-btn" style="background:#007bff;color:white;" onclick="continueFresh()">▶ Продолжить</button>
    `;
}
function continueFresh() {
    score = { correct:0, total:0 };
    document.getElementById('results-screen').classList.add('hidden');
    document.getElementById('quiz-card').classList.remove('hidden');
    next();
}

render();
</script>
</body>
</html>
