
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy English</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 16px; background: #f0f2f5; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        nav button { cursor: pointer; padding: 12px; border: none; border-radius: 8px; flex: 1; font-weight: bold; font-size: 15px; background: #eee; color: #333; }
        nav button.active { background: #007bff; color: white; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid #ddd; width: 100%; margin-bottom: 10px; border-radius: 6px; font-size: 16px; }
        .word-item { background: white; padding: 10px 14px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid #007bff; align-items: center; }
        .stats { font-size: 12px; color: gray; margin: 8px 0; }
        #quiz-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
        #quiz-tabs button { cursor: pointer; font-size: 13px; padding: 8px; background: #eee; color: #333; border: none; border-radius: 8px; flex: 1; font-weight: bold; }
        #quiz-tabs button.active { background: #007bff; color: white; }
        #score-bar { height: 6px; background: #eee; border-radius: 3px; margin: 8px 0 14px; overflow: hidden; }
        #score-fill { height: 100%; background: #28a745; width: 0%; transition: width 0.4s; border-radius: 3px; }
        .q-btn { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; padding: 12px; width: 100%; margin-top: 8px; }
        #options { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
        .opt-btn { cursor: pointer; background: #f4f4f4; color: #333; border-radius: 8px; padding: 13px; font-size: 15px; text-align: left; border: 2px solid transparent; font-weight: normal; width: 100%; }
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; font-weight: bold; }
        .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .res-btn { cursor: pointer; width: 100%; padding: 14px; font-size: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; }
        .missed-list { text-align: left; margin-top: 12px; max-height: 180px; overflow-y: auto; }
        .missed-item { background: #fff0f0; border-left: 4px solid #dc3545; padding: 8px 12px; margin-top: 6px; border-radius: 6px; font-size: 13px; }
    </style>
</head>
<body>

<nav>
    <button id="b1" class="active" onclick="tab('add')">📖 Словарь</button>
    <button id="b2" onclick="tab('quiz')">🎯 Тренировка</button>
</nav>

<!-- СЛОВАРЬ -->
<div id="add">
    <div class="card">
        <input type="text" id="e" placeholder="English..." oninput="autoFill(this.value)">
        <input type="text" id="r" placeholder="Перевод...">
        <button onclick="addWord()" style="background:#28a745;color:white;width:100%;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:bold;cursor:pointer;">Сохранить</button>
    </div>
    <input type="text" id="search" placeholder="🔍 Поиск..." oninput="render()" style="margin-top:14px;">
    <div id="list"></div>
    <button onclick="clearAll()" style="margin-top:14px;background:none;color:gray;font-size:11px;border:1px solid #ccc;border-radius:6px;padding:8px;width:100%;cursor:pointer;">Очистить мои слова</button>
</div>

<!-- ТРЕНИРОВКА -->
<div id="quiz" class="hidden">
    <div id="quiz-tabs">
        <button id="qt1" class="active" onclick="setMode('flash')">Карточки</button>
        <button id="qt2" onclick="setMode('choice')">Выбор</button>
        <button id="qt3" onclick="setMode('type')">Письмо</button>
    </div>
    <div id="quiz-card" class="card" style="text-align:center;">
        <div id="count" class="stats"></div>
        <div id="score-bar"><div id="score-fill"></div></div>
        <h2 id="qw" style="font-size:28px;margin:12px 0 4px;">...</h2>
        <p id="hint" style="font-size:12px;color:#bbb;margin:0 0 12px;"></p>
        <!-- Карточки -->
        <div id="mode-flash">
            <h3 id="qr" class="hidden" style="color:#28a745;font-size:22px;margin:0 0 14px;"></h3>
            <button class="q-btn" onclick="showAns()" style="background:#eee;color:#333;">👁 Показать ответ</button>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="q-btn" onclick="markCard(false)" style="background:#f8d7da;color:#721c24;flex:1;">✗ Не знал</button>
                <button class="q-btn" onclick="markCard(true)" style="background:#d4edda;color:#155724;flex:1;">✓ Знал</button>
            </div>
        </div>
        <!-- Выбор -->
        <div id="mode-choice" class="hidden">
            <div id="options"></div>
            <button id="next-choice" class="q-btn hidden" onclick="next()" style="background:#007bff;color:white;margin-top:14px;">Дальше →</button>
        </div>
        <!-- Письмо -->
        <div id="mode-type" class="hidden">
            <input type="text" id="type-input" placeholder="Введи перевод..." style="text-align:center;font-size:18px;">
            <button class="q-btn" onclick="checkType()" style="background:#007bff;color:white;">Проверить</button>
            <div id="type-result" style="font-size:15px;margin:10px 0;min-height:22px;"></div>
            <button id="next-type" class="q-btn hidden" onclick="next()" style="background:#555;color:white;">Дальше →</button>
        </div>
    </div>
    <!-- Результаты -->
    <div id="results-screen" class="hidden card" style="text-align:center;">
        <div id="results-body"></div>
    </div>
</div>

// ===== СЛОВАРЬ =====
function autoFill(v) {
    let w = v.toLowerCase().trim();
    if (base[w]) document.getElementById('r').value = base[w];
}

function addWord() {
    let en = document.getElementById('e').value.trim();
    let ru = document.getElementById('r').value.trim();
    if (!en || !ru) return;
    if (myWords.find(w => w.en.toLowerCase() === en.toLowerCase())) { alert("Уже есть!"); return; }
    myWords.push({ en, ru });
    save(); render();
    document.getElementById('e').value = '';
    document.getElementById('r').value = '';
}

function save() { localStorage.setItem('myWords', JSON.stringify(myWords)); }

function render() {
    let q = (document.getElementById('search').value || '').toLowerCase();
    let d = document.getElementById('list');
    let mySet = new Set(myWords.map(w => w.en.toLowerCase()));

    let myF = myWords.filter(w => !q || w.en.toLowerCase().includes(q) || w.ru.toLowerCase().includes(q));
    let baseF = Object.entries(base).filter(([k,v]) => !mySet.has(k) && q && (k.includes(q) || v.includes(q)));

    d.innerHTML = `<div class="stats">Мои: ${myWords.length} · База: ${Object.keys(base).length}</div>`;

    if (myF.length) {
        d.innerHTML += `<div style="font-size:12px;color:#555;margin:8px 0 4px;font-weight:bold;">📌 Мои слова</div>`;
        myF.forEach((w, i) => {
            d.innerHTML += `<div class="word-item"><span><b>${w.en}</b> — ${w.ru}</span><button onclick="delWord(${i})" style="color:red;background:none;border:none;font-size:18px;padding:4px 8px;cursor:pointer;">✕</button></div>`;
        });
    }
    if (baseF.length) {
        d.innerHTML += `<div style="font-size:12px;color:#555;margin:10px 0 4px;font-weight:bold;">📚 Из базы (${baseF.length})</div>`;
        baseF.slice(0, 30).forEach(([en, ru]) => {
            d.innerHTML += `<div class="word-item" style="border-left-color:#aaa;"><span><b>${en}</b> — ${ru}</span><button onclick="addFromBase('${en}','${ru.replace(/'/g,"&#39;")}')" style="color:#28a745;background:none;border:none;font-size:22px;padding:4px 8px;cursor:pointer;">+</button></div>`;
        });
        if (baseF.length > 30) d.innerHTML += `<p style="text-align:center;font-size:12px;color:gray;">…ещё ${baseF.length-30}. Уточни поиск.</p>`;
    }
}

function addFromBase(en, ru) {
    if (!myWords.find(w => w.en.toLowerCase() === en)) { myWords.push({en, ru}); save(); render(); }
}
function delWord(i) { myWords.splice(i, 1); save(); render(); }
function clearAll() { if (confirm("Удалить все?")) { myWords = []; save(); render(); } }

// ===== ВКЛАДКИ =====
function tab(t) {
    document.getElementById('add').className  = t==='add'  ? '' : 'hidden';
    document.getElementById('quiz').className = t==='quiz' ? '' : 'hidden';
    document.getElementById('b1').className   = t==='add'  ? 'active' : '';
    document.getElementById('b2').className   = t==='quiz' ? 'active' : '';
    if (t==='quiz') startFresh();
}

function setMode(m) {
    quizMode = m;
    ['flash','choice','type'].forEach((x, i) => {
        document.getElementById('mode-'+x).className = x===m ? '' : 'hidden';
        document.getElementById('qt'+(i+1)).className = x===m ? 'active' : '';
    });
    startFresh();
}

// ===== РАУНДЫ =====
function getPool() {
    if (isRetry) return [...missed];
    let pool = myWords.map(w => ({ en: w.en, ru: w.ru }));
    if (pool.length < 4) {
        let extras = Object.entries(base).map(([en, ru]) => ({ en, ru }));
        pool = [...pool, ...extras].filter((v, i, a) => a.findIndex(x => x.en === v.en) === i);
    }
    return pool;
}

function startFresh() {
    isRetry = false;
    missed = [];
    score = { correct: 0, total: 0 };
    deck = [];
    showQuizCard();
    next();
}

function startRetry() {
    isRetry = true;
    score = { correct: 0, total: 0 };
    deck = [...missed].sort(() => Math.random() - 0.5);
    missed = [];
    showQuizCard();
    next();
}

function showQuizCard() {
    document.getElementById('results-screen').classList.add('hidden');
    document.getElementById('quiz-card').classList.remove('hidden');
}

// ===== СЛЕДУЮЩЕЕ СЛОВО =====
function next() {
    let pool = getPool();
    if (!pool.length) { alert("Добавь слова!"); return; }

    if (!deck.length) {
        if (score.total > 0) { showResults(); return; }
        deck = [...pool].sort(() => Math.random() - 0.5);
    }

    current = deck.pop();
    answerShown = false;
    document.getElementById('qw').innerText = current.en;
    document.getElementById('hint').innerText = '→ какой перевод?';
    updateCount();

    if (quizMode === 'flash') {
        document.getElementById('qr').innerText = current.ru;
        document.getElementById('qr').classList.add('hidden');
    } else if (quizMode === 'choice') {
        buildOptions(pool);
        document.getElementById('next-choice').classList.add('hidden');
    } else {
        document.getElementById('type-input').value = '';
        document.getElementById('type-result').innerText = '';
        document.getElementById('next-type').classList.add('hidden');
        setTimeout(() => document.getElementById('type-input').focus(), 100);
    }
}

function updateCount() {
    let pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
    let label = isRetry ? '🔁 Повтор ошибок' : '📚 Раунд';
    document.getElementById('count').innerText = `${label} · Осталось: ${deck.length} · ${score.correct}/${score.total} (${pct}%)`;
    document.getElementById('score-fill').style.width = pct + '%';
}

// ===== РЕЗУЛЬТАТЫ =====
function showResults() {
    document.getElementById('quiz-card').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');
    let pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
    let emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '😅';
    let missedHTML = missed.map(w => `<div class="missed-item"><b>${w.en}</b> — ${w.ru}</div>`).join('');
    document.getElementById('results-body').innerHTML = `
        <div style="font-size:56px;margin:8px 0;">${emoji}</div>
        <h2 style="margin:6px 0;">${score.correct} / ${score.total} верно · ${pct}%</h2>
        <p style="color:gray;font-size:13px;">${isRetry ? 'Повтор ошибок' : 'Раунд завершён'}</p>
        ${missed.length
            ? `<p style="color:#dc3545;font-size:13px;margin:8px 0;">❌ Ошибок: ${missed.length}</p>
               <div class="missed-list">${missedHTML}</div>
               <button class="res-btn" style="background:#dc3545;color:white;" onclick="startRetry()">🔁 Повторить ошибки (${missed.length})</button>`
            : `<p style="color:#28a745;font-size:14px;">Ошибок нет! 🎉</p>`
        }
        <button class="res-btn" style="background:#007bff;color:white;" onclick="startFresh()">▶ Новый раунд</button>
    `;
}

// ===== КАРТОЧКИ =====
function showAns() {
    document.getElementById('qr').classList.remove('hidden');
    answerShown = true;
}
function markCard(knew) {
    if (!answerShown) { showAns(); return; }
    score.total++;
    if (knew) score.correct++;
    else addMissed(current);
    next();
}

// ===== ВЫБОР =====
function buildOptions(pool) {
    let correct = current.ru;
    let wrong = pool.filter(w => w.en !== current.en)
        .sort(() => Math.random() - 0.5).slice(0, 3)
        .map(w => w.ru);
    let opts = [...wrong, correct].sort(() => Math.random() - 0.5);
    let d = document.getElementById('options');
    d.innerHTML = '';
    opts.forEach(o => {
        let btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = o;
        btn.onclick = () => checkOption(o, correct);
        d.appendChild(btn);
    });
}
function checkOption(chosen, correct) {
    score.total++;
    document.querySelectorAll('.opt-btn').forEach(b => {
        b.onclick = null;
        if (b.innerText === correct) b.className = 'opt-btn correct';
        else if (b.innerText === chosen && chosen !== correct) b.className = 'opt-btn wrong';
    });
    if (chosen === correct) score.correct++;
    else addMissed(current);
    updateCount();
    document.getElementById('next-choice').classList.remove('hidden');
}

// ===== ПИСЬМО =====
function checkType() {
    let inp = document.getElementById('type-input').value.trim().toLowerCase();
    if (!inp) return;
    let variants = current.ru.toLowerCase().split('/').map(v => v.trim());
    let ok = variants.some(v => v === inp);
    score.total++;
    if (ok) {
        score.correct++;
        document.getElementById('type-result').innerHTML = `<span style="color:#28a745">✓ Верно!</span>`;
    } else {
        addMissed(current);
        document.getElementById('type-result').innerHTML = `<span style="color:#dc3545">✗ Правильно: <b>${current.ru}</b></span>`;
    }
    updateCount();
    document.getElementById('next-type').classList.remove('hidden');
}
document.getElementById('type-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        if (!document.getElementById('next-type').classList.contains('hidden')) next();
        else checkType();
    }
});

function addMissed(w) {
    if (!missed.find(x => x.en === w.en)) missed.push({ en: w.en, ru: w.ru });
}

render();
</script>
</body>
</html>
