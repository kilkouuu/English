<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy English</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 16px; background: #f0f2f5; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; padding: 12px; border: none; border-radius: 8px; flex: 1; font-weight: bold; font-size: 15px; }
        .active { background: #007bff; color: white; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid #ddd; width: 100%; margin-bottom: 10px; border-radius: 6px; font-size: 16px; }
        .word-item { background: white; padding: 10px 14px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid #007bff; align-items: center; }
        #search { margin-bottom: 10px; }
        .stats { font-size: 12px; color: gray; margin: 8px 0; }
        #quiz-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
        #quiz-tabs button { font-size: 13px; padding: 8px; background: #eee; color: #333; }
        #quiz-tabs button.active { background: #007bff; color: white; }
        #options { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
        .opt-btn { background: #f4f4f4; color: #333; border-radius: 8px; padding: 12px; font-size: 15px; text-align: left; border: 2px solid transparent; transition: 0.2s; }
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        #score-bar { height: 6px; background: #eee; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #score-fill { height: 100%; background: #28a745; width: 0%; transition: width 0.4s; border-radius: 3px; }
    </style>
</head>
<body>

<nav>
    <button id="b1" class="active" onclick="tab('add')">📖 Словарь</button>
    <button id="b2" onclick="tab('quiz')">🎯 Тренировка</button>
</nav>

<!-- СЛОВАРЬ -->
<div id="add">
    <div class="card">
        <input type="text" id="e" placeholder="English..." oninput="auto(this.value)">
        <input type="text" id="r" placeholder="Перевод...">
        <button onclick="add()" style="background:#28a745; color:white; width:100%">Сохранить</button>
    </div>
    <input type="text" id="search" placeholder="🔍 Поиск по словам..." oninput="render()" style="margin-top:14px;">
    <div id="list"></div>
    <button onclick="clearAll()" style="margin-top:16px; background:none; color:gray; font-size:11px; border:1px solid #ccc; flex:none; width:100%;">Очистить мои слова (сброс)</button>
</div>

<!-- ТРЕНИРОВКА -->
<div id="quiz" class="hidden">
    <div id="quiz-tabs">
        <button id="qt1" class="active" onclick="setMode('flash')">Карточки</button>
        <button id="qt2" onclick="setMode('choice')">Выбор</button>
        <button id="qt3" onclick="setMode('type')">Письмо</button>
    </div>
    <div class="card" style="text-align:center">
        <div id="count" class="stats"></div>
        <div id="score-bar"><div id="score-fill"></div></div>
        <h2 id="qw" style="font-size:28px; margin:16px 0 8px">...</h2>
        <p id="hint" style="font-size:12px; color:#aaa; margin:0 0 14px;"></p>

        <!-- Карточки -->
        <div id="mode-flash">
            <h3 id="qr" class="hidden" style="color:#28a745; font-size:22px;"></h3>
            <button onclick="showAns()" style="width:100%; margin-bottom:10px; background:#eee; color:#333;">Показать ответ</button>
            <div style="display:flex; gap:8px;">
                <button onclick="markCard(false)" style="background:#f8d7da; color:#721c24; flex:1;">✗ Не знал</button>
                <button onclick="markCard(true)" style="background:#d4edda; color:#155724; flex:1;">✓ Знал</button>
            </div>
        </div>

        <!-- Выбор -->
        <div id="mode-choice" class="hidden">
            <div id="options"></div>
            <button id="next-choice" onclick="next()" class="hidden" style="background:#007bff; color:white; width:100%; margin-top:14px;">Дальше →</button>
        </div>

        <!-- Письмо -->
        <div id="mode-type" class="hidden">
            <input type="text" id="type-input" placeholder="Введи перевод..." style="text-align:center; font-size:18px;">
            <button onclick="checkType()" style="background:#007bff; color:white; width:100%; margin-bottom:10px;">Проверить</button>
            <div id="type-result" style="font-size:16px; margin:8px 0;"></div>
            <button id="next-type" onclick="next()" class="hidden" style="background:#555; color:white; width:100%;">Дальше →</button>
        </div>
    </div>
</div>

// ===================== АВТОЗАПОЛНЕНИЕ =====================
function auto(v) {
    let w = v.toLowerCase().trim();
    if (base[w]) document.getElementById('r').value = base[w];
}

// ===================== ДОБАВИТЬ СЛОВО =====================
function add() {
    let en = document.getElementById('e').value.trim();
    let ru = document.getElementById('r').value.trim();
    if (en && ru) {
        let exists = myWords.find(w => (w.en || w.eng || '').toLowerCase() === en.toLowerCase());
        if (exists) { alert("Это слово уже есть в твоём словаре!"); return; }
        myWords.push({ en, ru });
        save();
        document.getElementById('e').value = '';
        document.getElementById('r').value = '';
        render();
    }
}

function save() {
    localStorage.setItem('myWords', JSON.stringify(myWords));
}

// ===================== РЕНДЕР СПИСКА =====================
function render() {
    let q = (document.getElementById('search').value || '').toLowerCase();
    let d = document.getElementById('list');

    // Объединяем: сначала мои слова, потом база (отфильтрованные)
    let mySet = new Set(myWords.map(w => (w.en || w.eng || '').toLowerCase()));
    let baseItems = Object.entries(base).filter(([k, v]) =>
        !mySet.has(k.toLowerCase()) && (!q || k.includes(q) || v.includes(q))
    );
    let myFiltered = myWords.filter(w => {
        let en = (w.en || w.eng || '').toLowerCase();
        let ru = (w.ru || w.rus || '').toLowerCase();
        return !q || en.includes(q) || ru.includes(q);
    });

    d.innerHTML = `<div class="stats">Мои слова: ${myWords.length} | База: ${Object.keys(base).length} слов</div>`;

    if (myFiltered.length > 0) {
        d.innerHTML += `<div style="font-size:12px; color:#555; margin:6px 0 4px; font-weight:bold;">📌 Мои слова</div>`;
        myFiltered.forEach((w, i) => {
            let en = w.en || w.eng || "—";
            let ru = w.ru || w.rus || "—";
            d.innerHTML += `<div class="word-item"><span><b>${en}</b> — ${ru}</span><button onclick="del(${i})" style="color:red;background:none;border:none;font-size:18px;padding:4px 8px;">✕</button></div>`;
        });
    }

    if (q && baseItems.length > 0) {
        d.innerHTML += `<div style="font-size:12px; color:#555; margin:10px 0 4px; font-weight:bold;">📚 База (${baseItems.length})</div>`;
        baseItems.slice(0, 30).forEach(([en, ru]) => {
            d.innerHTML += `<div class="word-item" style="border-left-color:#aaa;"><span><b>${en}</b> — ${ru}</span><button onclick="addFromBase('${en}','${ru.replace(/'/g,"&#39;")}')" style="color:#28a745;background:none;border:none;font-size:20px;padding:4px 8px;">+</button></div>`;
        });
        if (baseItems.length > 30) d.innerHTML += `<p style="font-size:12px; color:gray; text-align:center;">…ещё ${baseItems.length - 30}. Уточни поиск.</p>`;
    }
}

function addFromBase(en, ru) {
    let exists = myWords.find(w => (w.en || w.eng || '').toLowerCase() === en.toLowerCase());
    if (!exists) {
        myWords.push({ en, ru });
        save();
        render();
    }
}

function del(i) {
    myWords.splice(i, 1);
    save();
    render();
}

function clearAll() {
    if (confirm("Удалить все свои слова?")) {
        myWords = [];
        save();
        render();
    }
}

// ===================== ВКЛАДКИ =====================
function tab(t) {
    document.getElementById('add').className = (t === 'add' ? '' : 'hidden');
    document.getElementById('quiz').className = (t === 'quiz' ? '' : 'hidden');
    document.getElementById('b1').className = (t === 'add' ? 'active' : '');
    document.getElementById('b2').className = (t === 'quiz' ? 'active' : '');
    if (t === 'quiz') { score = { correct: 0, total: 0 }; next(); }
}

// ===================== РЕЖИМ ТРЕНИРОВКИ =====================
function setMode(m) {
    quizMode = m;
    ['flash','choice','type'].forEach(x => {
        document.getElementById('mode-' + x).className = (x === m ? '' : 'hidden');
        document.getElementById('qt' + (['flash','choice','type'].indexOf(x) + 1)).className = (x === m ? 'active' : '');
    });
    score = { correct: 0, total: 0 };
    next();
}

// ===================== ПОЛУЧИТЬ СЛОВО =====================
function getPool() {
    // Используем мои слова + базу как одну колоду
    let pool = myWords.map(w => ({ en: w.en || w.eng, ru: w.ru || w.rus }));
    if (pool.length < 4) {
        // Добавляем слова из базы если мало
        let extras = Object.entries(base).map(([en, ru]) => ({ en, ru }));
        pool = [...pool, ...extras].filter((v, i, a) => a.findIndex(x => x.en === v.en) === i);
    }
    return pool;
}

function next() {
    let pool = getPool();
    if (pool.length === 0) { alert("Добавь слова!"); return; }
    if (deck.length === 0) deck = [...pool].sort(() => Math.random() - 0.5);
    current = deck.pop();
    answerShown = false;

    // Определяем направление: рандомно en→ru или ru→en
    let reverse = Math.random() > 0.5 && myWords.length > 0;
    if (reverse) {
        document.getElementById('qw').innerText = current.ru;
        document.getElementById('hint').innerText = '→ русский→английский';
        current._ask = 'ru';
    } else {
        document.getElementById('qw').innerText = current.en;
        document.getElementById('hint').innerText = '→ английский→русский';
        current._ask = 'en';
    }

    updateScore();

    // Сброс UI
    if (quizMode === 'flash') {
        document.getElementById('qr').className = 'hidden';
        document.getElementById('qr').innerText = reverse ? current.en : current.ru;
    } else if (quizMode === 'choice') {
        buildOptions(pool, reverse);
        document.getElementById('next-choice').className = 'hidden';
    } else {
        document.getElementById('type-input').value = '';
        document.getElementById('type-result').innerText = '';
        document.getElementById('next-type').className = 'hidden';
    }
}

function updateScore() {
    let pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
    document.getElementById('count').innerText = `В пачке: ${deck.length} | Верно: ${score.correct}/${score.total} (${pct}%)`;
    document.getElementById('score-fill').style.width = pct + '%';
}

// ===================== КАРТОЧКИ =====================
function showAns() {
    document.getElementById('qr').className = '';
    answerShown = true;
}

function markCard(knew) {
    if (!answerShown) { showAns(); return; }
    score.total++;
    if (knew) score.correct++;
    next();
}

// ===================== ВЫБОР ВАРИАНТА =====================
function buildOptions(pool, reverse) {
    let correct = reverse ? current.en : current.ru;
    let wrong = pool.filter(w => w.en !== current.en)
        .sort(() => Math.random() - 0.5).slice(0, 3)
        .map(w => reverse ? w.en : w.ru);
    let opts = [...wrong, correct].sort(() => Math.random() - 0.5);
    let d = document.getElementById('options');
    d.innerHTML = '';
    opts.forEach(o => {
        let btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = o;
        btn.onclick = () => checkOption(o, correct);
        d.appendChild(btn);
    });
}

function checkOption(chosen, correct) {
    score.total++;
    let btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => {
        b.onclick = null;
        if (b.innerText === correct) b.className = 'opt-btn correct';
        else if (b.innerText === chosen && chosen !== correct) b.className = 'opt-btn wrong';
    });
    if (chosen === correct) score.correct++;
    updateScore();
    document.getElementById('next-choice').className = '';
}

// ===================== ПИСЬМО =====================
function checkType() {
    let input = document.getElementById('type-input').value.trim().toLowerCase();
    let correct = (current._ask === 'en' ? current.ru : current.en).toLowerCase();
    let res = document.getElementById('type-result');
    score.total++;
    if (input === correct || correct.split(' / ').some(v => v.trim() === input)) {
        res.innerHTML = `<span style="color:#28a745">✓ Верно!</span>`;
        score.correct++;
    } else {
        res.innerHTML = `<span style="color:#dc3545">✗ Было: <b>${correct}</b></span>`;
    }
    updateScore();
    document.getElementById('next-type').className = '';
}

document.getElementById('type-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkType();
});

render();
</script>
</body>
</html>
