<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy English</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 16px; background: #f0f2f5; }

        /* Переключатель языка */
        #lang-switcher { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 6px; }
        .lang-btn { cursor: pointer; padding: 5px 14px; border: 2px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: bold; background: white; color: #888; transition: all 0.2s; }
        .lang-btn.active { border-color: #007bff; color: #007bff; background: #e8f0fe; }

        /* Синхронизация */
        #sync-status { text-align: center; font-size: 11px; margin-bottom: 10px; padding: 5px 10px; border-radius: 20px; }
        #sync-status.ok   { background: #d4edda; color: #155724; }
        #sync-status.err  { background: #f8d7da; color: #721c24; }
        #sync-status.sync { background: #fff3cd; color: #856404; }

        nav { display: flex; gap: 6px; margin-bottom: 20px; }
        nav button { cursor: pointer; padding: 10px 4px; border: none; border-radius: 8px; flex: 1; font-weight: bold; font-size: 12px; background: #eee; color: #333; }
        nav button.active { background: #007bff; color: white; }

        /* Японская тема */
        body.jp nav button.active { background: #e63946; }
        body.jp .lang-btn.active  { border-color: #e63946; color: #e63946; background: #fde8ea; }

        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid #ddd; width: 100%; margin-bottom: 10px; border-radius: 6px; font-size: 16px; }
        .word-item { background: white; padding: 10px 14px; margin-top: 8px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid #007bff; align-items: center; }
        body.jp .word-item { border-left-color: #e63946; }
        .stats { font-size: 12px; color: gray; margin: 8px 0; }
        .mode-tabs { display: grid; gap: 8px; margin-bottom: 14px; }
        .mode-tabs.cols2 { grid-template-columns: 1fr 1fr; }
        .mode-tabs.cols4 { grid-template-columns: 1fr 1fr; }
        .mode-tabs button { cursor: pointer; font-size: 12px; padding: 9px 6px; background: #eee; color: #333; border: none; border-radius: 8px; font-weight: bold; line-height: 1.4; }
        .mode-tabs button.active { background: #007bff; color: white; }
        body.jp .mode-tabs button.active { background: #e63946; }
        #score-bar, #score-bar2 { height: 6px; background: #eee; border-radius: 3px; margin: 8px 0 14px; overflow: hidden; }
        #score-fill, #score-fill2 { height: 100%; background: #28a745; width: 0%; transition: width 0.4s; border-radius: 3px; }
        .q-btn { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; padding: 12px; width: 100%; margin-top: 8px; }
        .res-btn { cursor: pointer; width: 100%; padding: 14px; font-size: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; }
        .level-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        textarea.export-area { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: monospace; resize: none; background: white; }
        .q-label { font-size: 12px; color: #aaa; margin: 0 0 6px; }
        .q-word { font-size: 30px; font-weight: bold; margin: 6px 0 14px; line-height: 1.2; }
        .a-word { color: #28a745; font-size: 22px; font-weight: bold; margin: 0 0 14px; }
        .empty-msg { text-align:center; color:#aaa; padding:30px 0; font-size:15px; }

        /* Алфавитная группа */
        .alpha-group { margin-top: 14px; }
        .alpha-letter { font-size: 11px; font-weight: bold; color: #aaa; padding: 6px 4px 2px; letter-spacing: 1px; }

        /* Заметки */
        .notes-list { display: flex; flex-direction: column; gap: 12px; }
        .note-card { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .note-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 10px; cursor: pointer; gap: 8px; }
        .note-title-text { font-weight: bold; font-size: 15px; flex: 1; color: #222; }
        .note-tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: bold; white-space: nowrap; }
        .note-toggle { color: #aaa; font-size: 18px; padding: 0 4px; transition: transform 0.2s; }
        .note-toggle.open { transform: rotate(180deg); }
        .note-body { padding: 0 14px 14px; font-size: 14px; line-height: 1.7; color: #333; border-top: 1px solid #f0f0f0; }
        .note-body h3 { font-size: 15px; color: #007bff; margin: 12px 0 6px; }
        .note-body strong { color: #222; }
        .note-body em { color: #555; }
        .note-body code { background: #f0f4ff; color: #3a3aff; padding: 2px 7px; border-radius: 5px; font-family: monospace; font-size: 13px; }
        .note-body blockquote { border-left: 3px solid #007bff; margin: 8px 0; padding: 6px 12px; background: #f0f7ff; border-radius: 0 8px 8px 0; color: #555; font-style: italic; }
        .note-body .example { background: #f6fff6; border-left: 3px solid #28a745; padding: 6px 12px; border-radius: 0 8px 8px 0; margin: 6px 0; font-size: 13px; }
        .note-body .warning { background: #fffbf0; border-left: 3px solid #ffc107; padding: 6px 12px; border-radius: 0 8px 8px 0; margin: 6px 0; font-size: 13px; }
        .note-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
        .note-body th { background: #f0f4ff; color: #007bff; padding: 6px 10px; text-align: left; }
        .note-body td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
        .note-editor { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 14px; }
        .editor-toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 12px; background: #f8f9fa; border-bottom: 1px solid #eee; }
        .toolbar-btn { cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 6px; padding: 5px 9px; font-size: 13px; color: #444; white-space: nowrap; }
        .toolbar-btn:hover { background: #007bff; color: white; border-color: #007bff; }
        .toolbar-sep { width: 1px; background: #ddd; margin: 2px; }
        .editor-fields { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .editor-fields input { margin: 0; font-size: 15px; }
        .tag-select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: white; color: #333; width: 100%; }
        #note-textarea { width: 100%; min-height: 160px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: sans-serif; resize: vertical; line-height: 1.6; }
        .editor-actions { display: flex; gap: 8px; padding: 0 12px 12px; }
        .notes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .notes-header h3 { margin: 0; font-size: 16px; }
        .add-note-btn { background: #007bff; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .tag-grammar { background:#e8f0fe;color:#1a73e8; } .tag-vocab { background:#e6f4ea;color:#1e8e3e; }
        .tag-tenses { background:#fce8e6;color:#d93025; } .tag-phrases { background:#fef7e0;color:#f09300; }
        .tag-tips { background:#f3e8fd;color:#9334e6; }   .tag-other { background:#f1f3f4;color:#5f6368; }
        .note-actions { display: flex; gap: 6px; }
        .note-act-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px; color: #aaa; }
    </style>
</head>
<body>

<!-- Переключатель языка -->
<div id="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('jp')">🇯🇵 Japanese</button>
</div>

<!-- Статус синхронизации -->
<div id="sync-status" class="sync">⏳ Подключение...</div>

<nav>
    <button id="nb1" class="active" onclick="tab('add')" data-t="nav-dict">📖 Словарь</button>
    <button id="nb2" onclick="tab('quiz')" data-t="nav-train">💪 Учу</button>
    <button id="nb3" onclick="tab('review')" data-t="nav-review">🔄 Знаю</button>
    <button id="nb4" onclick="tab('notes')" data-t="nav-notes">📝 Правила</button>
</nav>

<!-- ========== СЛОВАРЬ ========== -->
<div id="add">
    <div class="card">
        <input type="text" id="e" data-ph="ph-word1" placeholder="English...">
        <input type="text" id="r" data-ph="ph-word2" placeholder="Перевод (через / или ,)...">
        <button onclick="addWord()" style="background:#28a745;color:white;width:100%;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:bold;cursor:pointer;" data-t="btn-save">Сохранить</button>
    </div>
    <input type="text" id="search" data-ph="ph-search" placeholder="🔍 Поиск..." oninput="render()" style="margin-top:14px;">
    <div id="list"></div>
    <button onclick="clearAll()" style="margin-top:14px;background:none;color:gray;font-size:11px;border:1px solid #ccc;border-radius:6px;padding:8px;width:100%;cursor:pointer;" data-t="btn-clear">Очистить все слова</button>
</div>

<!-- ========== ТРЕНИРОВКА ========== -->
<div id="quiz" class="hidden">
    <div class="mode-tabs cols4">
        <button id="qt1" class="active" onclick="setQuizMode('flash-en')">👁 <span data-t="dir-fwd"></span><br><span style="font-weight:normal;font-size:11px;" data-t="mode-flash">знаю/не знаю</span></button>
        <button id="qt2" onclick="setQuizMode('type-en')">✍️ <span data-t="dir-fwd"></span><br><span style="font-weight:normal;font-size:11px;" data-t="mode-type">написать</span></button>
        <button id="qt3" onclick="setQuizMode('flash-ru')">👁 <span data-t="dir-rev"></span><br><span style="font-weight:normal;font-size:11px;" data-t="mode-flash">знаю/не знаю</span></button>
        <button id="qt4" onclick="setQuizMode('type-ru')">✍️ <span data-t="dir-rev"></span><br><span style="font-weight:normal;font-size:11px;" data-t="mode-type">написать</span></button>
    </div>
    <div id="quiz-empty" class="hidden card"><div class="empty-msg" data-t="quiz-empty">🎉 Слабых слов нет!</div></div>
    <div id="quiz-card" class="card" style="text-align:center;">
        <div id="q-count" class="stats"></div>
        <div id="score-bar"><div id="score-fill"></div></div>
        <div id="q-level" style="font-size:12px;margin-bottom:4px;"></div>
        <p id="q-label" class="q-label"></p>
        <div id="q-word" class="q-word"></div>
        <div id="qmode-flash">
            <div id="q-answer" class="a-word hidden"></div>
            <button class="q-btn" onclick="showAns('q')" style="background:#eee;color:#333;" data-t="btn-show">👁 Показать ответ</button>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="q-btn" onclick="markQ(false)" style="background:#f8d7da;color:#721c24;flex:1;" data-t="btn-no">✗ Не знал</button>
                <button class="q-btn" onclick="markQ(true)" style="background:#d4edda;color:#155724;flex:1;" data-t="btn-yes">✓ Знал</button>
            </div>
        </div>
        <div id="qmode-type" class="hidden">
            <input type="text" id="q-type-input" placeholder="Введи ответ..." style="text-align:center;font-size:18px;">
            <button class="q-btn" onclick="checkQType()" style="background:#007bff;color:white;" data-t="btn-check">Проверить</button>
            <div id="q-type-result" style="font-size:15px;margin:10px 0;min-height:22px;"></div>
            <button id="q-next-type" class="q-btn hidden" onclick="nextQ()" style="background:#555;color:white;" data-t="btn-next">Дальше →</button>
        </div>
    </div>
    <div id="quiz-results" class="hidden card" style="text-align:center;"><div id="quiz-results-body"></div></div>
</div>

<!-- ========== ПОВТОРЕНИЕ ========== -->
<div id="review" class="hidden">
    <div class="mode-tabs cols2">
        <button id="rt1" class="active" onclick="setReviewMode('flash-en')">👁 <span data-t="dir-fwd"></span><br><span style="font-weight:normal;font-size:11px;" data-t="mode-flash">знаю/не знаю</span></button>
        <button id="rt2" onclick="setReviewMode('flash-ru')">👁 <span data-t="dir-rev"></span><br><span style="font-weight:normal;font-size:11px;" data-t="mode-flash">знаю/не знаю</span></button>
    </div>
    <div id="review-empty" class="hidden card"><div class="empty-msg" data-t="review-empty">📚 Нет слов для повторения</div></div>
    <div id="review-card" class="card" style="text-align:center;">
        <div id="r-count" class="stats"></div>
        <div id="score-bar2"><div id="score-fill2"></div></div>
        <div id="r-level" style="font-size:12px;margin-bottom:4px;"></div>
        <p id="r-label" class="q-label"></p>
        <div id="r-word" class="q-word"></div>
        <div id="r-answer" class="a-word hidden"></div>
        <button class="q-btn" onclick="showAns('r')" style="background:#eee;color:#333;" data-t="btn-show">👁 Показать ответ</button>
        <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="q-btn" onclick="markR(false)" style="background:#f8d7da;color:#721c24;flex:1;" data-t="btn-no">✗ Не знал</button>
            <button class="q-btn" onclick="markR(true)" style="background:#d4edda;color:#155724;flex:1;" data-t="btn-yes">✓ Знал</button>
        </div>
    </div>
    <div id="review-results" class="hidden card" style="text-align:center;"><div id="review-results-body"></div></div>
</div>

<!-- ========== ЗАМЕТКИ ========== -->
<div id="notes" class="hidden">
    <div id="note-editor-wrap" class="hidden">
        <div class="note-editor">
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="ins('**','**')">𝐁</button>
                <button class="toolbar-btn" onclick="ins('_','_')">𝑰</button>
                <button class="toolbar-btn" onclick="ins('`','`')">{ }</button>
                <div class="toolbar-sep"></div>
                <button class="toolbar-btn" onclick="insLine('### ')">H3</button>
                <button class="toolbar-btn" onclick="insLine('> ')">❝</button>
                <div class="toolbar-sep"></div>
                <button class="toolbar-btn" onclick="insBlock('[example]','[/example]')">✅ пример</button>
                <button class="toolbar-btn" onclick="insBlock('[warn]','[/warn]')">⚠️ важно</button>
                <div class="toolbar-sep"></div>
                <button class="toolbar-btn" onclick="insTable()">⊞ табл.</button>
            </div>
            <div class="editor-fields">
                <input type="text" id="note-title" placeholder="Название правила...">
                <select id="note-tag" class="tag-select">
                    <option value="grammar">📘 Грамматика</option>
                    <option value="tenses">⏰ Времена</option>
                    <option value="vocab">📗 Лексика</option>
                    <option value="phrases">💬 Фразы</option>
                    <option value="tips">💡 Советы</option>
                    <option value="other">📁 Другое</option>
                </select>
                <textarea id="note-textarea" placeholder="Текст правила...&#10;**жирный**, _курсив_, `код`&#10;### Заголовок&#10;> Цитата&#10;[example]Пример[/example]&#10;[warn]Важно[/warn]"></textarea>
            </div>
            <div class="editor-actions">
                <button onclick="saveNote()" style="background:#007bff;color:white;flex:2;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:bold;cursor:pointer;">💾 Сохранить</button>
                <button onclick="cancelNote()" style="background:#eee;color:#555;flex:1;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:bold;cursor:pointer;">Отмена</button>
            </div>
        </div>
    </div>
    <div id="notes-list-wrap">
        <div class="notes-header">
            <h3>📝 <span data-t="nav-notes">Правила</span></h3>
            <button class="add-note-btn" onclick="openNoteEditor()">+ Добавить</button>
        </div>
        <input type="text" id="notes-search" placeholder="🔍 Поиск по правилам..." oninput="renderNotes()" style="margin-bottom:12px;">
        <div id="notes-list" class="notes-list"></div>
        <div id="notes-empty" class="hidden" style="text-align:center;color:#aaa;padding:40px 0;font-size:15px;">📝 Правил пока нет</div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ============ FIREBASE CONFIG ============
const firebaseConfig = {
    apiKey: "AIzaSyDwE_t1SmaGIYOt9XDmLQyCiTu0QY2JVxQ",
    authDomain: "jaoa-13e90.firebaseapp.com",
    databaseURL: "https://jaoa-13e90-default-rtdb.firebaseio.com",
    projectId: "jaoa-13e90",
    storageBucket: "jaoa-13e90.firebasestorage.app",
    messagingSenderId: "565247253706",
    appId: "1:565247253706:web:ce4d7c07c744ccd047a833"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ============ СИНХРОНИЗАЦИЯ ============
let saveTimeout = null;

// Всегда читаем из window.currentLang — он обновляется основным скриптом
function dbPath(key) {
    return `data_${window.currentLang || 'en'}/${key}`;
}

// Загрузка данных из Firebase при старте
async function loadFromFirebase() {
    setSyncStatus('sync', '⏳ Загрузка...');
    try {
        // Слова
        const wordsSnap = await get(ref(db, dbPath('words')));
        if (wordsSnap.exists()) {
            myWords = wordsSnap.val() || [];
            if (!Array.isArray(myWords)) myWords = Object.values(myWords);
        } else {
            // Первый раз — мигрируем из localStorage если есть
            const local = localStorage.getItem('myWords_' + currentLang) || localStorage.getItem('myWords');
            if (local) { myWords = JSON.parse(local); await saveToFirebase('words', myWords); }
        }
        // Заметки
        const notesSnap = await get(ref(db, dbPath('notes')));
        if (notesSnap.exists()) {
            myNotes = notesSnap.val() || [];
            if (!Array.isArray(myNotes)) myNotes = Object.values(myNotes);
        } else {
            const local = localStorage.getItem('myNotes');
            if (local) { myNotes = JSON.parse(local); await saveToFirebase('notes', myNotes); }
        }
        setSyncStatus('ok', '✅ Синхронизировано');
        render(); renderNotes();
    } catch(e) {
        setSyncStatus('err', '❌ Нет соединения — данные локальные');
        // Откат на localStorage
        const w = localStorage.getItem('myWords_' + (window.currentLang||'en')) || localStorage.getItem('myWords');
        const n = localStorage.getItem('myNotes_' + (window.currentLang||'en')) || localStorage.getItem('myNotes');
        if (w) myWords = JSON.parse(w);
        if (n) myNotes = JSON.parse(n);
        render(); renderNotes();
    }
}

async function saveToFirebase(key, data) {
    try {
        await set(ref(db, dbPath(key)), data);
        setSyncStatus('ok', '✅ Сохранено');
        // Тоже в localStorage как резерв
        localStorage.setItem('myWords_' + (window.currentLang||'en'), JSON.stringify(myWords));
        localStorage.setItem('myNotes_' + (window.currentLang||'en'), JSON.stringify(myNotes));
    } catch(e) {
        setSyncStatus('err', '❌ Ошибка сохранения');
    }
}

function setSyncStatus(cls, text) {
    const el = document.getElementById('sync-status');
    el.className = cls;
    el.innerText = text;
}

// Дебаунс — не сохраняем на каждое нажатие, а через 1 сек после последнего
function scheduleSave(key, data) {
    clearTimeout(saveTimeout);
    setSyncStatus('sync', '⏳ Сохранение...');
    saveTimeout = setTimeout(() => saveToFirebase(key, data), 1000);
}

// Делаем функции глобальными для доступа из обычного кода ниже
window._fbSaveWords = () => scheduleSave('words', myWords);
window._fbSaveNotes = () => scheduleSave('notes', myNotes);
window._fbLoad = loadFromFirebase;
window._setSyncStatus = setSyncStatus;

// Старт
loadFromFirebase();
</script>

// ============================================================
// ДАННЫЕ
// ============================================================
const LEVEL_LABELS = ['🔴 Новое','🟠 Сложное','🟡 Учу','🟢 Знаю','💙 Хорошо','⭐ Отлично'];
const LEVEL_COLORS = ['#dc3545','#fd7e14','#ffc107','#28a745','#007bff','#6f42c1'];
const COOLDOWN     = [0, 2, 5, 11, 24, 49];
// Улучшенные веса: ещё сильнее давим слабые, ещё реже показываем сильные
const W            = [120, 50, 18, 5, 1, 1];
const REVIEW_THRESHOLD = 3;

let myWords = [];
let myNotes = [];
let editingNoteId = null;

let quizMode = 'flash-en';
let qScore={correct:0,total:0}, qRecent=[], qCurrent=null, qAnswerShown=false;
let reviewMode = 'flash-en';
let rScore={correct:0,total:0}, rRecent=[], rCurrent=null, rAnswerShown=false;

// Стрик ошибок — если ошибся 2+ раза подряд, уровень падает на 2
let qErrorStreak = {};

function ensureLevels() { myWords.forEach(w=>{if(w.level===undefined)w.level=0;}); }
function weakWords()   { return myWords.filter(w=>(w.level||0)<REVIEW_THRESHOLD); }
function strongWords() { return myWords.filter(w=>(w.level||0)>=REVIEW_THRESHOLD); }

// Нормализуем варианты ответа: разбиваем по / и ,
function getVariants(str) {
    return str.toLowerCase()
        .split(/[\/,]/)
        .map(v => v.trim())
        .filter(v => v.length > 0);
}

function checkAnswer(input, correct) {
    const inp = input.toLowerCase().trim();
    return getVariants(correct).some(v => v === inp);
}

// ============================================================
// АЛГОРИТМ (улучшенный)
// ============================================================
function pickFrom(pool, recentArr) {
    if (!pool.length) return null;

    // Фильтруем по cooldown
    let available = pool.filter(w => {
        let li = recentArr.lastIndexOf(w.en);
        return li === -1 || (recentArr.length - li) > COOLDOWN[Math.min(w.level,5)];
    });

    // Если все в кулдауне — берём самое давнее
    if (!available.length) {
        available = [...pool].sort((a,b) => recentArr.lastIndexOf(a.en) - recentArr.lastIndexOf(b.en));
        available = [available[0]];
    }

    // Взвешенный выбор — слова с ошибочным стриком получают +50% веса
    let total = available.reduce((s,w) => {
        let base = W[Math.min(w.level,5)];
        let bonus = (qErrorStreak[w.en] || 0) >= 2 ? base * 0.5 : 0;
        return s + base + bonus;
    }, 0);

    let rand = Math.random() * total;
    let chosen = available[0];
    for (let w of available) {
        let base = W[Math.min(w.level,5)];
        let bonus = (qErrorStreak[w.en] || 0) >= 2 ? base * 0.5 : 0;
        rand -= (base + bonus);
        if (rand <= 0) { chosen = w; break; }
    }

    recentArr.push(chosen.en);
    if (recentArr.length > 60) recentArr.shift();
    return { en: chosen.en, ru: chosen.ru, level: chosen.level };
}

function updateLevel(en, knew) {
    let w = myWords.find(x => x.en === en);
    if (!w) return;

    if (knew) {
        qErrorStreak[en] = 0;
        w.level = Math.min((w.level||0)+1, 5);
    } else {
        qErrorStreak[en] = (qErrorStreak[en] || 0) + 1;
        // Стрик 2+ ошибок → падаем на 2 уровня
        let drop = qErrorStreak[en] >= 2 ? 2 : 1;
        w.level = Math.max((w.level||0) - drop, 0);
    }
    if (window._fbSaveWords) window._fbSaveWords();
}

// ============================================================
// СЛОВАРЬ
// ============================================================
function addWord() {
    let en = document.getElementById('e').value.trim();
    let ru = document.getElementById('r').value.trim();
    if (!en || !ru) return;
    if (myWords.find(w => w.en.toLowerCase() === en.toLowerCase())) { alert("Уже есть!"); return; }
    myWords.push({ en, ru, level: 0 });
    if (window._fbSaveWords) window._fbSaveWords();
    render();
    document.getElementById('e').value = '';
    document.getElementById('r').value = '';
}

function render() {
    ensureLevels();
    let q = (document.getElementById('search').value || '').toLowerCase();
    let d = document.getElementById('list');
    let filtered = myWords
        .filter(w => !q || w.en.toLowerCase().includes(q) || w.ru.toLowerCase().includes(q))
        .sort((a,b) => a.en.localeCompare(b.en, 'en')); // Алфавитный порядок

    let counts = [0,0,0,0,0,0];
    myWords.forEach(w => counts[Math.min(w.level||0,5)]++);
    d.innerHTML = `<div class="stats">Слов: ${myWords.length} &nbsp;·&nbsp; 💪 ${counts[0]+counts[1]+counts[2]} &nbsp;·&nbsp; 🔄 ${counts[3]+counts[4]+counts[5]}</div>`;

    // Группировка по первой букве
    let currentLetter = '';
    filtered.forEach((w, i) => {
        let letter = w.en[0].toUpperCase();
        if (letter !== currentLetter) {
            currentLetter = letter;
            d.innerHTML += `<div class="alpha-letter">${letter}</div>`;
        }
        let lvl = Math.min(w.level||0,5);
        // Находим реальный индекс в myWords
        let realIdx = myWords.findIndex(x => x.en === w.en);
        d.innerHTML += `<div class="word-item">
            <span><span class="level-dot" style="background:${LEVEL_COLORS[lvl]};"></span><b>${w.en}</b> — ${w.ru}</span>
            <button onclick="delWord(${realIdx})" style="color:red;background:none;border:none;font-size:18px;padding:4px 8px;cursor:pointer;">✕</button>
        </div>`;
    });
}

function delWord(i) { myWords.splice(i,1); if(window._fbSaveWords)window._fbSaveWords(); render(); }
function clearAll() {
    if(confirm("Удалить все слова?")) {
        myWords=[];
        if(window._fbSaveWords)window._fbSaveWords();
        render();
    }
}

function tab(name) {
    ['add','quiz','review','notes'].forEach(x => document.getElementById(x).className = x===name?'':'hidden');
    ['nb1','nb2','nb3','nb4'].forEach((id,i) => document.getElementById(id).className = i===(['add','quiz','review','notes'].indexOf(name))?'active':'');

    if(name==='review') startReview();
    if(name==='notes')  renderNotes();
}

// ============================================================
// ТРЕНИРОВКА
// ============================================================
function setQuizMode(m) {
    quizMode=m;
    ['flash-en','type-en','flash-ru','type-ru'].forEach((x,i)=>document.getElementById('qt'+(i+1)).className=x===m?'active':'');
    startQuiz();
}
function startQuiz() {
    ensureLevels(); qScore={correct:0,total:0}; qRecent=[];
    let pool=weakWords();
    document.getElementById('quiz-results').classList.add('hidden');
    if(!pool.length){document.getElementById('quiz-card').classList.add('hidden');document.getElementById('quiz-empty').classList.remove('hidden');return;}
    document.getElementById('quiz-empty').classList.add('hidden');document.getElementById('quiz-card').classList.remove('hidden');
    nextQ();
}
function nextQ() {
    let pool=weakWords();
    if(!pool.length){document.getElementById('quiz-card').classList.add('hidden');document.getElementById('quiz-empty').classList.remove('hidden');return;}
    if(qScore.total>0&&qScore.total%20===0){showQuizSummary();return;}
    qCurrent=pickFrom(pool,qRecent); if(!qCurrent)return; qAnswerShown=false;
    let lvl=Math.min(qCurrent.level||0,5);
    document.getElementById('q-level').innerText=LEVEL_LABELS[lvl];
    document.getElementById('q-level').style.color=LEVEL_COLORS[lvl];
    let isRU=quizMode==='flash-ru'||quizMode==='type-ru';
    document.getElementById('q-label').innerText=isRU?t('lbl-rev'):t('lbl-fwd');
    document.getElementById('q-word').innerText=isRU?qCurrent.ru:qCurrent.en;
    let isFlash=quizMode==='flash-en'||quizMode==='flash-ru';
    document.getElementById('qmode-flash').classList.toggle('hidden',!isFlash);
    document.getElementById('qmode-type').classList.toggle('hidden',isFlash);
    if(isFlash){document.getElementById('q-answer').innerText=isRU?qCurrent.en:qCurrent.ru;document.getElementById('q-answer').classList.add('hidden');}
    else{document.getElementById('q-type-input').value='';document.getElementById('q-type-result').innerText='';document.getElementById('q-next-type').classList.add('hidden');document.getElementById('q-type-input').placeholder=isRU?t('lbl-type-rev'):t('lbl-type-fwd');setTimeout(()=>document.getElementById('q-type-input').focus(),100);}
    updateQCount();
}
function updateQCount(){
    let pct=qScore.total>0?Math.round(qScore.correct/qScore.total*100):0;
    document.getElementById('q-count').innerText=`💪 ${weakWords().length} · ✓ ${qScore.correct}/${qScore.total} (${pct}%)`;
    document.getElementById('score-fill').style.width=pct+'%';
}
function showAns(s){
    if(s==='q'){document.getElementById('q-answer').classList.remove('hidden');qAnswerShown=true;}
    else{document.getElementById('r-answer').classList.remove('hidden');rAnswerShown=true;}
}
function markQ(knew){
    if(!qAnswerShown){showAns('q');return;}
    qScore.total++; if(knew)qScore.correct++;
    updateLevel(qCurrent.en,knew); updateQCount(); nextQ();
}
function checkQType(){
    let inp=document.getElementById('q-type-input').value.trim(); if(!inp)return;
    let isRU=quizMode==='type-ru';
    let correct=isRU?qCurrent.en:qCurrent.ru;
    let ok=checkAnswer(inp,correct);
    qScore.total++; if(ok){qScore.correct++;document.getElementById('q-type-result').innerHTML='<span style="color:#28a745">✓ Верно!</span>';}
    else{document.getElementById('q-type-result').innerHTML=`<span style="color:#dc3545">✗ ${correct}</span>`;}
    updateLevel(qCurrent.en,ok); updateQCount(); document.getElementById('q-next-type').classList.remove('hidden');
}
document.getElementById('q-type-input').addEventListener('keydown',e=>{
    if(e.key==='Enter'){if(!document.getElementById('q-next-type').classList.contains('hidden'))nextQ();else checkQType();}
});
function showQuizSummary(){
    document.getElementById('quiz-card').classList.add('hidden');document.getElementById('quiz-results').classList.remove('hidden');
    let pct=Math.round(qScore.correct/qScore.total*100); let emoji=pct>=80?'🎉':pct>=50?'💪':'😅';
    document.getElementById('quiz-results-body').innerHTML=`<div style="font-size:48px;margin:8px 0;">${emoji}</div><h2>${qScore.correct}/${qScore.total} · ${pct}%</h2><div style="background:#f8f9fa;border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:14px;line-height:2;">💪 Ещё учу: <b>${weakWords().length}</b><br>🔄 Готовы к повторению: <b>${strongWords().length}</b></div><button class="res-btn" style="background:#007bff;color:white;" onclick="continueQuiz()">▶ Продолжить</button>`;
}
function continueQuiz(){qScore={correct:0,total:0};document.getElementById('quiz-results').classList.add('hidden');document.getElementById('quiz-card').classList.remove('hidden');nextQ();}

function setReviewMode(m){
    reviewMode=m;
    document.getElementById('rt1').className=m==='flash-en'?'active':'';
    document.getElementById('rt2').className=m==='flash-ru'?'active':'';
    startReview();
}
function startReview(){
    ensureLevels(); rScore={correct:0,total:0}; rRecent=[];
    let pool=strongWords();
    document.getElementById('review-results').classList.add('hidden');
    if(!pool.length){document.getElementById('review-card').classList.add('hidden');document.getElementById('review-empty').classList.remove('hidden');return;}
    document.getElementById('review-empty').classList.add('hidden');document.getElementById('review-card').classList.remove('hidden'); nextR();
}
function nextR(){
    let pool=strongWords();
    if(!pool.length){document.getElementById('review-card').classList.add('hidden');document.getElementById('review-empty').classList.remove('hidden');return;}
    if(rScore.total>0&&rScore.total%20===0){showReviewSummary();return;}
    rCurrent=pickFrom(pool,rRecent); if(!rCurrent)return; rAnswerShown=false;
    let lvl=Math.min(rCurrent.level||0,5);
    document.getElementById('r-level').innerText=LEVEL_LABELS[lvl];document.getElementById('r-level').style.color=LEVEL_COLORS[lvl];
    let isRU=reviewMode==='flash-ru';
    document.getElementById('r-label').innerText=isRU?t('lbl-rev'):t('lbl-fwd');
    document.getElementById('r-word').innerText=isRU?rCurrent.ru:rCurrent.en;
    document.getElementById('r-answer').innerText=isRU?rCurrent.en:rCurrent.ru;
    document.getElementById('r-answer').classList.add('hidden'); updateRCount();
}
function updateRCount(){
    let pct=rScore.total>0?Math.round(rScore.correct/rScore.total*100):0;
    document.getElementById('r-count').innerText=`🔄 ${strongWords().length} · ✓ ${rScore.correct}/${rScore.total} (${pct}%)`;
    document.getElementById('score-fill2').style.width=pct+'%';
}
function markR(knew){
    if(!rAnswerShown){showAns('r');return;}
    rScore.total++; if(knew)rScore.correct++;
    updateLevel(rCurrent.en,knew); updateRCount(); nextR();
}
function showReviewSummary(){
    document.getElementById('review-card').classList.add('hidden');document.getElementById('review-results').classList.remove('hidden');
    let pct=Math.round(rScore.correct/rScore.total*100); let emoji=pct>=80?'🎉':pct>=50?'💪':'😅';
    document.getElementById('review-results-body').innerHTML=`<div style="font-size:48px;margin:8px 0;">${emoji}</div><h2>${rScore.correct}/${rScore.total} · ${pct}%</h2><button class="res-btn" style="background:#007bff;color:white;" onclick="continueReview()">▶ Продолжить</button>`;
}
function continueReview(){rScore={correct:0,total:0};document.getElementById('review-results').classList.add('hidden');document.getElementById('review-card').classList.remove('hidden');nextR();}

// ЗАМЕТКИ
// ============================================================
const TAG_LABELS={grammar:'📘 Грамматика',tenses:'⏰ Времена',vocab:'📗 Лексика',phrases:'💬 Фразы',tips:'💡 Советы',other:'📁 Другое'};

function openNoteEditor(id=null){
    editingNoteId=id;
    let n=id?myNotes.find(x=>x.id===id):null;
    document.getElementById('note-title').value=n?n.title:'';
    document.getElementById('note-tag').value=n?n.tag:'grammar';
    document.getElementById('note-textarea').value=n?n.text:'';
    document.getElementById('note-editor-wrap').classList.remove('hidden');
    document.getElementById('notes-list-wrap').classList.add('hidden');
}
function cancelNote(){document.getElementById('note-editor-wrap').classList.add('hidden');document.getElementById('notes-list-wrap').classList.remove('hidden');}
function saveNote(){
    let title=document.getElementById('note-title').value.trim();
    let text=document.getElementById('note-textarea').value.trim();
    let tag=document.getElementById('note-tag').value;
    if(!title||!text){alert("Заполни название и текст!");return;}
    if(editingNoteId){let n=myNotes.find(x=>x.id===editingNoteId);if(n){n.title=title;n.text=text;n.tag=tag;}}
    else{myNotes.unshift({id:Date.now(),title,text,tag,open:false});}
    if(window._fbSaveNotes)window._fbSaveNotes();
    cancelNote(); renderNotes();
}
function deleteNote(id){if(!confirm("Удалить?"))return;myNotes=myNotes.filter(x=>x.id!==id);if(window._fbSaveNotes)window._fbSaveNotes();renderNotes();}
function toggleNote(id){let n=myNotes.find(x=>x.id===id);if(n)n.open=!n.open;if(window._fbSaveNotes)window._fbSaveNotes();renderNotes();}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseNote(text){
    let lines=text.split('\n'),result=[],i=0;
    while(i<lines.length){
        if(i+1<lines.length&&/^\|.*\|$/.test(lines[i].trim())&&/^\|[\s\-\|]+\|$/.test(lines[i+1].trim())){
            let headers=lines[i].trim().split('|').filter(c=>c.trim()).map(c=>c.trim());
            let rows=[];i+=2;
            while(i<lines.length&&/^\|.*\|$/.test(lines[i].trim())){rows.push(lines[i].trim().split('|').filter(c=>c.trim()).map(c=>c.trim()));i++;}
            let th=headers.map(h=>`<th>${escHtml(h)}</th>`).join('');
            let tr=rows.map(r=>`<tr>${r.map(c=>`<td>${escHtml(c)}</td>`).join('')}</tr>`).join('');
            result.push(`<table><tr>${th}</tr>${tr}</table>`);
        } else {result.push(lines[i]);i++;}
    }
    text=result.join('\n');
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\[example\]([\s\S]*?)\[\/example\]/g,(_,c)=>`<div class="example">✅ ${c.trim()}</div>`)
        .replace(/\[warn\]([\s\S]*?)\[\/warn\]/g,(_,c)=>`<div class="warning">⚠️ ${c.trim()}</div>`)
        .replace(/^### (.+)$/gm,'<h3>$1</h3>')
        .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/_(.+?)_/g,'<em>$1</em>')
        .replace(/`(.+?)`/g,'<code>$1</code>')
        .replace(/&lt;table&gt;([\s\S]*?)&lt;\/table&gt;/g,(_,inner)=>'<table>'+inner.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')+'</table>')
        .replace(/\n/g,'<br>');
}
function renderNotes(){
    let q=(document.getElementById('notes-search').value||'').toLowerCase();
    let filtered=myNotes.filter(n=>!q||n.title.toLowerCase().includes(q)||n.text.toLowerCase().includes(q));
    let container=document.getElementById('notes-list');
    document.getElementById('notes-empty').classList.toggle('hidden',filtered.length>0);
    container.innerHTML=filtered.map(n=>`
        <div class="note-card">
            <div class="note-header" onclick="toggleNote(${n.id})">
                <span class="note-title-text">${escHtml(n.title)}</span>
                <span class="note-tag tag-${n.tag}">${TAG_LABELS[n.tag]||'📁'}</span>
                <div class="note-actions" onclick="event.stopPropagation()">
                    <button class="note-act-btn" onclick="openNoteEditor(${n.id})">✏️</button>
                    <button class="note-act-btn" onclick="deleteNote(${n.id})">🗑️</button>
                </div>
                <span class="note-toggle ${n.open?'open':''}">▾</span>
            </div>
            ${n.open?`<div class="note-body">${parseNote(n.text)}</div>`:''}
        </div>`).join('');
}

// ============================================================
// ИНСТРУМЕНТЫ РЕДАКТОРА
// ============================================================
function ins(b,a){let ta=document.getElementById('note-textarea');let s=ta.selectionStart,e=ta.selectionEnd;let sel=ta.value.substring(s,e)||'текст';ta.value=ta.value.substring(0,s)+b+sel+a+ta.value.substring(e);ta.selectionStart=s+b.length;ta.selectionEnd=s+b.length+sel.length;ta.focus();}
function insLine(p){let ta=document.getElementById('note-textarea');let s=ta.selectionStart;let bef=ta.value.substring(0,s);let ins=(bef.length&&!bef.endsWith('\n')?'\n':'')+p;ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;ta.focus();}
function insBlock(o,c){let ta=document.getElementById('note-textarea');let s=ta.selectionStart,e=ta.selectionEnd;let sel=ta.value.substring(s,e)||'Текст';let ins='\n'+o+sel+c+'\n';ta.value=ta.value.substring(0,s)+ins+ta.value.substring(e);ta.focus();}
function insTable(){let ta=document.getElementById('note-textarea');let s=ta.selectionStart;let tpl='\n| Заголовок 1 | Заголовок 2 |\n| --- | --- |\n| Ячейка 1 | Ячейка 2 |\n';ta.value=ta.value.substring(0,s)+tpl+ta.value.substring(s);ta.focus();}
