<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy English</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #f0f2f5; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; padding: 12px; border: none; border-radius: 8px; flex: 1; font-weight: bold; }
        .active { background: #007bff; color: white; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 6px; }
        .word-item { background: white; padding: 10px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid #007bff; align-items: center; }
    </style>
</head>
<body>

<nav>
    <button id="b1" class="active" onclick="tab('add')">Словарь</button>
    <button id="b2" onclick="tab('quiz')">Тренировка</button>
</nav>

<div id="add">
    <div class="card">
        <input type="text" id="e" placeholder="English..." oninput="auto(this.value)">
        <input type="text" id="r" placeholder="Перевод...">
        <button onclick="add()" style="background:#28a745; color:white; width:100%">Сохранить</button>
    </div>
    <div id="list"></div>
    <button onclick="clearAll()" style="margin-top:20px; background:none; color:gray; font-size:10px; border:1px solid #ccc">Очистить всё (сброс)</button>
</div>

<div id="quiz" class="hidden">
    <div class="card" style="text-align:center">
        <div id="count" style="font-size:12px; color:gray"></div>
        <h2 id="qw">...</h2>
        <h3 id="qr" class="hidden" style="color:#28a745"></h3>
        <button onclick="document.getElementById('qr').classList.remove('hidden')" style="width:100%; margin-bottom:10px">Проверить</button>
        <button onclick="next()" style="background:#007bff; color:white; width:100%">Дальше →</button>
    </div>
</div>

<script>
    const base = {"alive":"живой","awful":"ужасный","borrow":"одалживать","cheap":"дешевый","common":"обычный","correct":"верный","decide":"решать","deep":"глубокий","explain":"объяснять","guess":"угадывать","happen":"случаться","improve":"улучшать","loud":"громкий","probably":"вероятно","suggest":"предлагать","worry":"беспокоиться"};

    let myWords = JSON.parse(localStorage.getItem('myWords')) || [];
    let deck = [];

    function auto(v) {
        let w = v.toLowerCase().trim();
        if(base[w]) document.getElementById('r').value = base[w];
    }

    function add() {
        let en = document.getElementById('e').value.trim();
        let ru = document.getElementById('r').value.trim();
        if(en && ru) {
            myWords.push({en, ru}); // Сохраняем в новом формате
            save();
            document.getElementById('e').value = '';
            document.getElementById('r').value = '';
            render();
        }
    }

    function save() {
        localStorage.setItem('myWords', JSON.stringify(myWords));
    }

    function render() {
        let d = document.getElementById('list');
        d.innerHTML = `<h4>Слов: ${myWords.length}</h4>`;
        myWords.forEach((w, i) => {
            // Проверка: берем en или eng, ru или rus
            let displayEn = w.en || w.eng || "—";
            let displayRu = w.ru || w.rus || "—";
            d.innerHTML += `<div class="word-item"><span><b>${displayEn}</b> - ${displayRu}</span><button onclick="del(${i})" style="color:red; background:none; border:none; font-size:18px">✕</button></div>`;
        });
    }

    function del(i) {
        myWords.splice(i, 1);
        save();
        render();
    }

    function clearAll() {
        if(confirm("Удалить все слова?")) {
            myWords = [];
            save();
            render();
        }
    }

    function tab(t) {
        document.getElementById('add').className = (t=='add' ? '' : 'hidden');
        document.getElementById('quiz').className = (t=='quiz' ? '' : 'hidden');
        document.getElementById('b1').className = (t=='add' ? 'active' : '');
        document.getElementById('b2').className = (t=='quiz' ? 'active' : '');
        if(t == 'quiz') next();
    }

    function next() {
        if(myWords.length == 0) return alert("Добавь слова!");
        if(deck.length == 0) deck = [...myWords].sort(() => Math.random() - 0.5);
        let w = deck.pop();
        document.getElementById('qw').innerText = w.en || w.eng;
        document.getElementById('qr').innerText = w.ru || w.rus;
        document.getElementById('qr').classList.add('hidden');
        document.getElementById('count').innerText = "В пачке осталось: " + deck.length;
    }

    render();
</script>
</body>
</html>
